name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      # Lint is temporarily disabled: the repo's ESLint setup needs
      # more work before it can run cleanly under ESLint 10 (see
      # eslint.config.mjs). Re-enable in a follow-up PR once rule
      # coverage is triaged.
      # - name: Lint
      #   run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @cobalt/components exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Upload a11y reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-reports
          path: packages/components/a11y-reports/
