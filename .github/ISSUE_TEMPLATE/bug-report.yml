name: Bug Report
description: Report a defect in a Cobalt package, component, token, or documentation example.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        A minimal reproduction and environment details make triage much faster.
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      description: Choose the package or area that best matches the bug.
      options:
        - '@cobalt/components'
        - '@cobalt/react'
        - '@cobalt/vue'
        - '@cobalt/angular'
        - '@cobalt/tokens'
        - '@cobalt/docs'
        - Multiple packages
        - Not sure
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: For example `@cobalt/react@1.2.3` or `main`.
      placeholder: '@cobalt/components@0.0.0'
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the user impact.
      placeholder: The component renders with the wrong state after...
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Include the smallest set of steps needed to reproduce the issue.
      placeholder: |
        1. Render...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      placeholder: The component should...
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      placeholder: The component instead...
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Reproduction link
      description: CodeSandbox, StackBlitz, GitHub repo, or other minimal reproduction.
      placeholder: https://
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share the relevant browser, OS, framework, and build tool details.
      placeholder: |
        - OS:
        - Browser:
        - Framework:
        - Build tool:
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: This issue affects accessibility behavior or assistive technology support.
        - label: This issue is a visual regression.
        - label: This issue blocks adoption or release work.
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or additional context
      description: Paste links or add any extra details that would help with triage.
      placeholder: Screenshots, recordings, logs, and notes.
    validations:
      required: false
